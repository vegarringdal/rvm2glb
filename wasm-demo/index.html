<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>rvm2glb</title>
    <!-- <model-viewer> renders the resulting GLB without any extra build step -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"
    ></script>
    <style>
      :root {
        --h: 48px;
        --footer-h: 50px;
        --w-config: 300px;
        --w-info: 360px;
        --bg: #16161a;
        --panel: #1e1e24;
        --header: #1b1b20;
        --border: #2d2d36;
        --text: #d9d9e0;
        --muted: #8a8a96;
        --accent: #34d3b0;
        --accent-ink: #042b22;
        --warn: #f5c518;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg); color: var(--text); overflow: hidden;
      }

      /* header */
      header {
        height: var(--h); display: flex; align-items: center; gap: 10px;
        padding: 0 10px; background: var(--header); border-bottom: 1px solid var(--border);
      }
      .brand { font-size: 15px; font-weight: 700; letter-spacing: 0.01em; }
      .brand b { color: var(--accent); }
      .gh { color: var(--muted); display: inline-flex; align-items: center; }
      .gh:hover { color: var(--text); }
      #status {
        margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis; max-width: 38vw;
      }
      /* converting / zipping: yellow so progress grabs focus */
      #status.busy { color: var(--warn); font-weight: 600; }
      .icon-btn {
        background: transparent; border: 0; color: var(--text); cursor: pointer;
        padding: 6px; border-radius: 6px; display: inline-flex; align-items: center;
        gap: 6px; font: inherit; line-height: 1;
      }
      .icon-btn:hover { background: var(--border); }

      /* layout */
      .layout { display: flex; height: calc(100% - var(--h) - var(--footer-h)); overflow: hidden; }
      footer {
        height: var(--footer-h); display: flex; align-items: center;
        justify-content: space-between; gap: 10px; padding: 0 12px;
        background: var(--header); border-top: 1px solid var(--border);
      }
      .stage { flex: 1; position: relative; min-width: 0; background: var(--bg); }
      model-viewer { position: absolute; inset: 0; width: 100%; height: 100%; background: var(--bg); }
      .empty {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        text-align: center; padding: 24px; color: var(--muted); pointer-events: none;
      }

      /* panels */
      .panel { display: flex; flex-direction: column; background: var(--panel); flex-shrink: 0; }
      .panel-left { width: var(--w-config); border-right: 1px solid var(--border); transition: margin-left 0.25s ease; }
      .panel-right { width: var(--w-info); border-left: 1px solid var(--border); transition: margin-right 0.25s ease; }
      body:not(.config-open) .panel-left { margin-left: calc(-1 * var(--w-config)); }
      body:not(.info-open) .panel-right { margin-right: calc(-1 * var(--w-info)); }
      .panel-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px;
      }
      .panel-body { flex: 1; overflow: auto; }

      /* config controls */
      section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
      section h2 {
        margin: 0 0 4px; font-size: 11px; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--muted);
      }
      .field { display: block; margin: 12px 0 4px; }
      .field-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
      .field input[type='range'] { width: 100%; accent-color: var(--accent); }
      .field input[type='file'] { width: 100%; color: var(--muted); font: inherit; }
      .field select, .field input[type='number'] {
        width: 100%; background: #2a2a32; color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 6px 8px; font: inherit;
      }
      .hint { display: block; color: var(--muted); font-size: 11px; line-height: 1.45; margin-top: 4px; }
      .hint code { background: #2a2a32; border-radius: 4px; padding: 0 4px; font-size: 11px; }
      output { color: var(--accent); font-variant-numeric: tabular-nums; }
      .check { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; cursor: pointer; }
      .check input { margin: 3px 0 0; accent-color: var(--accent); flex-shrink: 0; }
      .check b { font-weight: 600; font-size: 13px; }
      .check small { display: block; color: var(--muted); font-size: 11px; line-height: 1.45; margin-top: 2px; }
      .btn {
        font: inherit; font-size: 13px; padding: 6px 12px; border: 0; border-radius: 7px;
        cursor: pointer; white-space: nowrap;
      }
      .btn-primary { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
      .btn-ghost { background: #2a2a32; color: var(--text); border: 1px solid var(--border); }
      .btn:disabled { opacity: 0.45; cursor: default; }

      /* output file list (right panel) */
      #files:empty::before {
        content: 'Convert an RVM file to see its output GLB(s) here.';
        color: var(--muted); display: block; padding: 14px 16px;
      }
      .file-row {
        display: flex; align-items: center; gap: 8px; padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      .file-row .meta { flex: 1; min-width: 0; }
      .file-row .name { font-size: 13px; word-break: break-all; }
      .file-row .name.active { color: var(--accent); }
      .file-row .size { color: var(--muted); font-size: 11px; }
      .file-row .btn { padding: 4px 9px; font-size: 12px; }

      /* responsive drawers */
      .backdrop { display: none; }
      @media (max-width: 820px) {
        .panel {
          position: fixed; top: var(--h); bottom: var(--footer-h); z-index: 30;
          width: min(86vw, 360px); margin: 0 !important;
        }
        .panel-left { left: 0; transform: translateX(-100%); transition: transform 0.25s ease; }
        .panel-right { right: 0; transform: translateX(100%); transition: transform 0.25s ease; }
        body.config-open .panel-left, body.info-open .panel-right { transform: none; }
        body.config-open .backdrop, body.info-open .backdrop {
          display: block; position: fixed; inset: var(--h) 0 var(--footer-h) 0;
          background: rgba(0, 0, 0, 0.55); z-index: 25;
        }
        #status { max-width: 30vw; }
      }
    </style>
  </head>
  <body>
    <script>
      if (!window.matchMedia('(max-width: 820px)').matches) {
        document.body.classList.add('config-open');
        document.body.classList.add('info-open');
      }
    </script>
    <header>
      <button id="menuToggle" class="icon-btn" aria-label="Toggle settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <span class="brand">rvm2<b>glb</b></span>
      <a class="gh" href="https://github.com/vegarringdal/rvm2glb" target="_blank" rel="noopener" title="View on GitHub" aria-label="View on GitHub">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
      </a>
      <span id="status">loading wasm…</span>
      <button id="infoToggle" class="icon-btn" aria-label="Toggle files" title="Output files">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h10l6 6v10a0 0 0 0 1 0 0H4z" /><polyline points="14 4 14 10 20 10" />
        </svg>
        Files
      </button>
    </header>

    <div class="layout">
      <!-- left: settings -->
      <aside class="panel panel-left">
        <div class="panel-head">
          <span>Settings</span>
          <button id="configClose" class="icon-btn" aria-label="Close settings" title="Close">✕</button>
        </div>
        <div class="panel-body">
          <section>
            <h2>Input</h2>
            <label class="field">
              <span class="field-label">RVM file</span>
              <input id="file" type="file" accept=".rvm,.RVM" />
              <span class="hint">Pick an <code>.rvm</code> file. It is converted entirely in your browser (in a Worker, streaming through OPFS) — nothing is uploaded.</span>
            </label>
          </section>

          <section>
            <h2>Output</h2>
            <label class="field">
              <span class="field-label">Mode</span>
              <select id="mode">
                <option value="0" selected>merged — one mesh per colour</option>
                <option value="1">instanced — shared meshes (node per occurrence)</option>
                <option value="3">gpu-instanced — EXT_mesh_gpu_instancing</option>
                <option value="2">standard — one mesh per component</option>
              </select>
              <span class="hint">merged bakes geometry per colour (smallest, web3d extras); instanced shares meshes; standard is the plain per-component node tree.</span>
            </label>
            <label class="field">
              <span class="field-label">Split level</span>
              <input id="level" type="number" min="0" value="0" />
              <span class="hint">Hierarchy depth to split into separate GLB files. <code>0</code> = one file per site.</span>
            </label>
            <label class="check">
              <input id="removeEmpty" type="checkbox" checked />
              <span><b>Remove empty</b><small>Drop nodes/branches with no geometry.</small></span>
            </label>
            <label class="check">
              <input id="highlight" type="checkbox" />
              <span><b>Highlight instanced</b><small>Instanced mode only: shared shapes yellow, one-offs grey.</small></span>
            </label>
          </section>

          <section>
            <h2>Tessellation</h2>
            <label class="field">
              <span class="field-label"><span>Tolerance</span><span><output id="tolVal">0.010</output></span></span>
              <input id="tolerance" type="range" min="0.001" max="0.1" step="0.001" value="0.01" />
              <span class="hint">Chord-height tolerance. Coarser = fewer triangles.</span>
            </label>
            <label class="check">
              <input id="includeLine" type="checkbox" />
              <span><b>Include lines</b><small>Emit RVM Line primitives. Off by default — they are numerous and add visual noise.</small></span>
            </label>
            <label class="field">
              <span class="field-label"><span>Line width</span><span><output id="lwVal">0.005</output></span></span>
              <input id="lineWidth" type="range" min="0.001" max="0.5" step="0.001" value="0.005" />
              <span class="hint">Width of the "+" cross drawn for RVM Line primitives (only when "Include lines" is on).</span>
            </label>
            <label class="check">
              <input id="alignSegments" type="checkbox" />
              <span><b>Align segments</b><small>Round circles up to a multiple of 4 segments (0/90/180/270 alignment, ~25% larger).</small></span>
            </label>
          </section>

          <section>
            <h2>Cleanup &amp; simplify</h2>
            <label class="check">
              <input id="cleanupPosition" type="checkbox" checked />
              <span><b>Weld positions</b><small>Merge coincident vertices per item. ⚠ With weld on you can't recompute good per-vertex normals afterwards (welded verts collapse to one) — turn it off if you plan to compute normals.</small></span>
            </label>
            <label class="field">
              <span class="field-label">Weld precision (decimals)</span>
              <input id="cleanupPrecision" type="number" min="0" max="9" value="3" />
              <span class="hint">Rounding grid for the weld (higher = finer).</span>
            </label>
            <label class="field">
              <span class="field-label"><span>meshopt threshold</span><span><output id="mtVal">0.75</output></span></span>
              <input id="meshoptThreshold" type="range" min="0" max="1" step="0.05" value="0.75" />
              <span class="hint">Simplify target (fraction of indices to keep; <code>1</code> disables). All modes.</span>
            </label>
            <label class="field">
              <span class="field-label"><span>meshopt error</span><span><output id="meVal">0.000</output></span></span>
              <input id="meshoptTargetError" type="range" min="0" max="0.1" step="0.001" value="0" />
              <span class="hint">Simplify error budget. At <code>0</code> only lossless collapses happen; raise for real simplification.</span>
            </label>
          </section>
        </div>
      </aside>

      <!-- center: viewer -->
      <div class="stage">
        <model-viewer id="viewer" camera-controls auto-rotate shadow-intensity="1" exposure="1"></model-viewer>
        <div id="empty" class="empty">Pick an RVM file, then click <b>View</b> on an output file.</div>
      </div>

      <!-- right: output files -->
      <aside class="panel panel-right">
        <div class="panel-head">
          <span>Output files</span>
          <button id="infoClose" class="icon-btn" aria-label="Close files" title="Close">✕</button>
        </div>
        <div id="files" class="panel-body"></div>
      </aside>
    </div>

    <footer>
      <span id="source" style="color: var(--muted); font-size: 12px">no file loaded</span>
      <button id="downloadAll" class="btn btn-ghost" disabled>Download all (.zip)</button>
    </footer>

    <div id="backdrop" class="backdrop"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
